<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oka_creative</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#F52549;--pink:#D63070;--yellow:#F5B800;--green:#9BC01C;--navy:#1A1A1A;--gray:#999;--border:#EBEBEB}
body{background:#fff;min-height:100vh;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);padding-bottom:48px}

/* HERO */
.hero{background:var(--red);padding:28px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hero-eye{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.7);margin-bottom:3px}
.hero-title{font-size:26px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:0.08em}
.hero-sub{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.7);margin-top:3px}
.hero-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap;flex-shrink:0}

/* COMMON */
.sec-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);margin:22px 20px 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1.5px;background:var(--red);opacity:0.2}
.card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;margin:0 16px 10px}

/* LIST */
.proj-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.proj-item:last-child{border-bottom:none}
.proj-item:hover{background:#FAFAFA}
.proj-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0}
.proj-name{flex:1;font-size:14px;font-weight:700}
.proj-prog{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--gray)}
.proj-del{font-size:16px;color:#DDD;padding:4px 6px;border-radius:6px;transition:color 0.15s}
.proj-del:hover{color:var(--red)}
.add-row{display:flex;gap:8px;margin:0 16px 0}
.add-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none;background:#fff}
.add-input::placeholder{color:#CCC;font-weight:400}
.add-input:focus{border-color:var(--red)}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer}
.add-btn:hover{opacity:0.88}

/* DETAIL HEADER */
.back-btn{display:flex;align-items:center;gap:6px;margin:16px 16px 0;font-family:'Nunito',sans-serif;font-size:12px;letter-spacing:1px;color:var(--gray);cursor:pointer;width:fit-content}
.back-btn:hover{color:var(--red)}
.title-row{display:flex;align-items:center;gap:8px;margin:6px 20px 0}
.proj-title-bar{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:900;color:var(--navy);flex:1;border:none;background:transparent;outline:none;padding:0}
.proj-title-bar:focus{border-bottom:2px solid var(--red)}
.title-edit-btn{font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;white-space:nowrap;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;transition:all 0.15s;font-family:'Nunito',sans-serif}
.title-edit-btn:hover{border-color:var(--red);color:var(--red)}

/* PROGRESS */
.prog-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.prog-num{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;color:var(--red)}
.prog-count{font-size:11px;color:var(--gray)}
.track{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.fill{height:100%;border-radius:99px;background:#FFD64D;transition:width 0.3s ease}

/* SCHEDULE */
.sch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sf label{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--gray);display:block;margin-bottom:5px}
.sf input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.sf input:focus{border-color:var(--green)}
.sf input[readonly]{color:var(--gray)}

/* TOGGLE PANELS */
.toggle-section{margin:0 16px 10px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.toggle-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background 0.15s}
.toggle-head:hover{background:#FAFAFA}
.toggle-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:var(--red);margin-right:4px}
.toggle-title{flex:1;font-size:13px;font-weight:700;color:var(--navy)}
.toggle-arrow{font-size:11px;color:var(--gray)}
.toggle-body{border-top:1px solid var(--border);background:#FAFCFF}

/* CLAUDE MD */
.claude-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff;flex-wrap:wrap}
.claude-path{flex:1;font-size:12px;color:var(--gray);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.claude-file-btn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;padding:6px 12px;border-radius:7px;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--gray);transition:all 0.15s}
.claude-file-btn:hover{border-color:var(--red);color:var(--red)}
.claude-save-btn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;padding:6px 12px;border-radius:7px;cursor:pointer;white-space:nowrap;border:none;background:var(--red);color:#fff}
.claude-save-btn:hover{opacity:0.88}
.claude-textarea{width:100%;min-height:180px;border:none;outline:none;padding:14px 16px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);resize:vertical;line-height:1.8;background:#FAFCFF}
#file-picker{display:none}

/* REFS */
.ref-list{padding:4px 0}
.ref-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.ref-item:last-child{border-bottom:none}
.ref-text{flex:1;font-size:13px;color:var(--navy);word-break:break-all;line-height:1.5}
.ref-text a{color:var(--red);text-decoration:none}
.ref-text a:hover{text-decoration:underline}
.ref-del{font-size:14px;color:#DDD;cursor:pointer;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:color 0.15s}
.ref-del:hover{color:var(--red)}
.ref-add-row{display:flex;gap:8px;padding:10px 14px;background:#fff;border-top:1px solid var(--border)}
.ref-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;outline:none;color:var(--navy)}
.ref-input:focus{border-color:var(--red)}
.ref-add-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap}
.ref-empty{padding:16px;font-size:12px;color:#CCC;text-align:center;font-family:'Nunito',sans-serif}

/* CHECKLIST */
.checklist-sec{margin:0 16px 4px}
.checklist-sec+.checklist-sec{margin-top:10px}
.cl-head{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:6px}
.cl-prep{background:var(--green)}
.cl-edit{background:var(--yellow)}
.cl-confirm{background:var(--red)}
.cl-num{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,0.85)}
.cl-ttl{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;flex:1;color:#fff}
.cl-arr{font-size:11px;color:rgba(255,255,255,0.65)}
.items{background:#fff;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.item{border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
/* 2-col layout: left=content, right=MEMO */
.item-inner{display:flex;align-items:stretch}
.item-left{flex:1;display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s;min-width:0}
.item-left:hover{background:#FAFAFA}
.item.done .item-left{background:#FFFDF0}
.item-body{flex:1;min-width:0}
.item-right{flex:1;border-left:1px dashed var(--border);display:flex;align-items:center;gap:6px;padding:8px 12px}
.memo-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#CCC;flex-shrink:0;letter-spacing:1px}
.item-memo-input{flex:1;border:none;padding:3px 2px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--gray);outline:none;background:transparent;min-width:0}
.item-memo-input::placeholder{color:#DDD}
.item-memo-input:focus{border-color:var(--red);color:var(--navy)}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.item.done .cb{background:#FFD64D;border-color:#FFD64D}
.ck{display:none;color:#fff;font-size:13px;font-weight:900}
.item.done .ck{display:block}
.it{font-size:14px;font-weight:700;color:var(--navy);line-height:1.45}
.item.done .it{color:#CCC;text-decoration:line-through}
.in{font-size:11px;color:#BBB;margin-top:2px;line-height:1.5}
.item-detail-btn{font-size:11px;color:#FA6775;font-weight:700;margin-top:3px;cursor:pointer;display:inline-block}
.item-detail-btn:hover{text-decoration:underline}

/* SEQ PANEL */
.seq-panel{display:none;background:#FFF8F8;border-top:1px solid var(--border);padding:14px 16px}
.seq-panel.open{display:block}
.seq-group{margin-bottom:12px}
.seq-group:last-child{margin-bottom:0}
.seq-group-label{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;color:#FA6775;margin-bottom:6px;font-weight:900}
.seq-row{display:flex;gap:8px;margin-bottom:4px;align-items:baseline}
.seq-row:last-child{margin-bottom:0}
.seq-track{font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;color:var(--red);min-width:36px;flex-shrink:0}
.seq-desc{font-size:12px;color:var(--navy);line-height:1.4}
.seq-desc small{color:var(--gray);font-size:11px}

/* ADD STEP */
.add-step-row{padding:10px 16px;border-top:1px solid var(--border)}
.add-step-trigger{font-size:12px;font-weight:700;color:#CCC;cursor:pointer;font-family:'Nunito',sans-serif;transition:color 0.15s}
.add-step-trigger:hover{color:var(--red)}
.add-step-form{display:flex;gap:6px;align-items:center}
.add-step-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.add-step-input:focus{border-color:var(--red)}
.add-step-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap}
.add-step-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--gray);cursor:pointer}

/* REFLECTION */
.refl-head{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:6px}
.refl-sublabel{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:var(--gray);margin-bottom:8px}
.refl-textarea{width:100%;min-height:120px;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);resize:vertical;outline:none;line-height:1.8}
.refl-textarea:focus{border-color:var(--green)}

/* EXTRA ITEMS */
.extra-badge{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#FA6775;background:#FFF0F2;padding:1px 5px;border-radius:4px;margin-right:6px}
.extra-text{font-size:14px;font-weight:700;color:var(--navy)}
.item.done .extra-text{color:#CCC;text-decoration:line-through}
.extra-edit-wrap{display:flex;gap:6px;align-items:center;width:100%}
.extra-edit-input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.extra-edit-input:focus{border-color:var(--red)}
.extra-save-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}
.extra-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-left:4px}
.extra-action-btn{font-size:13px;color:#CCC;padding:3px 5px;cursor:pointer;border-radius:4px;transition:color 0.15s;line-height:1;user-select:none;background:none;border:none;font-family:inherit}
.extra-action-btn:hover:not(:disabled){color:var(--red)}
.extra-action-btn:disabled{opacity:0.2;cursor:default}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-left">
    <div class="hero-eye">VIDEO EDITING</div>
    <div class="hero-title">動画編集完全ワークフロー</div>
    <div class="hero-sub">COMPLETE WORKFLOW</div>
  </div>
  <div class="hero-badge">WORKFLOW</div>
</div>

<input type="file" id="file-picker" accept=".md,.txt">
<div id="view-list"></div>
<div id="view-detail" style="display:none"></div>

<script>
const STEPS_PREP=[
  {t:'ディレクトリを作る'},
  {t:'案件概要確認 → Claudeに送って .md作成',n:'クライアント情報・トンマナ・報酬・納期・請求情報'},
  {t:'素材受け取り・ダウンロード',n:'当日または遅くても翌日 ／ ギガファイル便にバックアップ'},
  {t:'素材整理（各ディレクトリに格納）'},
  {t:'参考動画リサーチ・ダウンロード',n:'YouTube限定公開 ／ ディレクトリに格納'},
];
const STEPS_EDIT=[
  {t:'Premiere Pro に素材を入れる'},
  {t:'基本音声調整',n:'カット前にここでやる'},
  {t:'基本色調調整'},
  {t:'基本スケール調整（必要な場合のみ）'},
  {t:'シーケンスを作り、動画を配置する',n:'V1–V14 ／ A1–A6 構成',seq:true},
  {t:'粗カット',n:'完全に不要な部分のみ ／ テンポは意識しない'},
  {t:'インサート配置'},
  {t:'細かいカット',n:'テンポを意識 ／ 声の開始部分に合わせてカット'},
  {t:'テロップ文字起こし'},
  {t:'テロップ作成'},
  {t:'BGM配置'},
  {t:'画像・イラスト挿入'},
  {t:'SE配置'},
];
const STEPS_CONFIRM=[
  {t:'書き出し'},
  {t:'チェック',n:'別チェックリストで確認'},
  {t:'納品・連絡'},
];
const ALL=[...STEPS_PREP,...STEPS_EDIT,...STEPS_CONFIRM];
const TOTAL=ALL.length;
const SEQ_IDX=STEPS_PREP.length+4;

const SEQ_V=[
  {k:'V1',d:'カラーマット'},
  {k:'V2',d:'メイン映像①'},
  {k:'V3',d:'メイン映像②'},
  {k:'V4',d:'調整レイヤー',s:'色調補正用'},
  {k:'V5',d:'調整レイヤー',s:'トランスフォーム用'},
  {k:'V6',d:'左上素材',s:'基本ずっと置いてあるやつ'},
  {k:'V7',d:'右上素材',s:'基本ずっと置いてあるやつ'},
  {k:'V8',d:'基本テロップ'},
  {k:'V9',d:'対話者テロップ'},
  {k:'V10',d:'強調テロップ背景素材'},
  {k:'V11',d:'強調テロップ'},
  {k:'V12',d:'インサート①'},
  {k:'V13',d:'インサート②'},
  {k:'V14',d:'インサート③'},
];
const SEQ_A=[
  {k:'A1',d:'メイン音声①'},
  {k:'A2',d:'メイン音声②'},
  {k:'A3',d:'SE①'},
  {k:'A4',d:'SE②'},
  {k:'A5',d:'BGM①'},
  {k:'A6',d:'BGM②'},
];

const KEY='cl_mp_v4';
let state={projects:[]};
let currentId=null;
let seqOpen=false;

function load(){try{const d=localStorage.getItem(KEY);if(d)state=JSON.parse(d);}catch(e){state={projects:[]}}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function getProj(id){return state.projects.find(p=>p.id===id)}
function ensureExtras(p){if(!p.extras)p.extras={prep:[],edit:[],confirm:[]};}
function ensureMemos(p){if(!p.memos)p.memos={};}
function ensureOrder(p){
  ensureExtras(p);
  if(!p.order)p.order={};
  const lens={prep:STEPS_PREP.length,edit:STEPS_EDIT.length,confirm:STEPS_CONFIRM.length};
  ['prep','edit','confirm'].forEach(sec=>{
    if(!p.order[sec]){
      const stdKeys=Array.from({length:lens[sec]},(_,i)=>i);
      const extraKeys=p.extras[sec].map((_,i)=>'e'+i);
      p.order[sec]=[...stdKeys,...extraKeys];
    }
  });
}
function totalSteps(p){ensureExtras(p);return TOTAL+p.extras.prep.length+p.extras.edit.length+p.extras.confirm.length;}
function doneCnt(p){ensureExtras(p);const base=p.checks.filter(Boolean).length;const ex=Object.values(p.extras).flat().filter(e=>e.done).length;return base+ex;}
function pct(p){const t=totalSteps(p);return t?Math.round(doneCnt(p)/t*100):0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ---- LIST ---- */
function renderList(){
  const el=document.getElementById('view-list');
  const ps=state.projects;
  el.innerHTML=`
    <div class="sec-label">案件一覧</div>
    ${ps.length===0?`<div class="card" style="color:#CCC;font-size:13px;text-align:center;padding:24px">案件がまだありません</div>`:`
    <div class="card" style="padding:0">
      ${ps.map(p=>`
        <div class="proj-item" onclick="openProj('${p.id}')">
          <div class="proj-dot" style="${pct(p)>0?'background:var(--red)':''}"></div>
          <div class="proj-name">${esc(p.name)}</div>
          <div class="proj-prog" style="${pct(p)>0?'color:var(--red)':''}">${pct(p)}%</div>
          <div class="proj-del" onclick="event.stopPropagation();delProj('${p.id}')">×</div>
        </div>`).join('')}
    </div>`}
    <div class="sec-label" style="margin-top:20px">新しい案件を追加</div>
    <div class="add-row">
      <input class="add-input" id="new-name" type="text" placeholder="案件名を入力..." onkeydown="if(event.key==='Enter')addProj()">
      <button class="add-btn" onclick="addProj()">追加</button>
    </div>`;
}

function addProj(){
  const inp=document.getElementById('new-name');
  const name=inp.value.trim();if(!name)return;
  const p={id:'p'+Date.now(),name,deadline:'',checks:Array(TOTAL).fill(false)};
  state.projects.push(p);save();openProj(p.id);
}
function delProj(id){
  if(!confirm('この案件を削除しますか？'))return;
  state.projects=state.projects.filter(p=>p.id!==id);
  if(currentId===id){currentId=null;showList();}else{save();renderList();}
}
function showList(){save();document.getElementById('view-list').style.display='';document.getElementById('view-detail').style.display='none';seqOpen=false;renderList();}
function openProj(id){currentId=id;seqOpen=false;save();document.getElementById('view-list').style.display='none';document.getElementById('view-detail').style.display='';renderDetail();}

/* ---- TITLE EDIT ---- */
function startEditTitle(){
  const inp=document.getElementById('title-input');
  inp.removeAttribute('readonly');inp.focus();inp.select();
  document.getElementById('title-edit-btn').textContent='保存';
  document.getElementById('title-edit-btn').onclick=saveTitle;
}
function saveTitle(){
  const inp=document.getElementById('title-input');
  const p=getProj(currentId);if(!p)return;
  const v=inp.value.trim();if(v)p.name=v;
  inp.setAttribute('readonly','');inp.value=p.name;
  document.getElementById('title-edit-btn').textContent='編集';
  document.getElementById('title-edit-btn').onclick=startEditTitle;
  save();renderList();
}

/* ---- DETAIL ---- */
function renderSection(sec,stdSteps,stdOffset,p){
  ensureOrder(p);
  return p.order[sec].map(key=>{
    if(typeof key==='number'){
      const idx=stdOffset+key;
      return itemHTML(stdSteps[key],idx,p.checks[idx],p.memos[idx]||'');
    }
    const eIdx=parseInt(key.slice(1));
    const e=p.extras[sec][eIdx];
    if(!e)return'';
    const arr=p.order[sec],pos=arr.indexOf(key);
    return extraItemHTML(e,eIdx,sec,key,pos>0,pos<arr.length-1,p.memos['e'+sec[0]+eIdx]||'');
  }).join('');
}

function renderDetail(){
  const p=getProj(currentId);if(!p)return showList();
  ensureExtras(p);ensureMemos(p);ensureOrder(p);
  const done=doneCnt(p),total=totalSteps(p),perc=Math.round(done/total*100);
  const eo=STEPS_PREP.length,co=eo+STEPS_EDIT.length;
  const prepSec=renderSection('prep',STEPS_PREP,0,p);
  const editSec=renderSection('edit',STEPS_EDIT,eo,p);
  const confirmSec=renderSection('confirm',STEPS_CONFIRM,co,p);

  document.getElementById('view-detail').innerHTML=`
    <div class="back-btn" onclick="showList()">← 案件一覧</div>
    <div class="title-row">
      <input class="proj-title-bar" id="title-input" value="${esc(p.name)}" readonly onkeydown="if(event.key==='Enter')saveTitle()">
      <div class="title-edit-btn" id="title-edit-btn" onclick="startEditTitle()">編集</div>
    </div>

    <div class="sec-label">PROGRESS</div>
    <div class="card">
      <div class="prog-row"><div class="prog-num">${perc}%</div><div class="prog-count">${done} / ${total} 完了</div></div>
      <div class="track"><div class="fill" style="width:${perc}%"></div></div>
    </div>

    <div class="sec-label">SCHEDULE</div>
    <div class="card">
      <div class="sch-grid">
        <div class="sf"><label>納期</label><input type="date" id="dl" value="${p.deadline||''}" onchange="saveDl(this.value)"></div>
        <div class="sf"><label>粗カット完了</label><input type="text" id="s1" readonly placeholder="—"></div>
        <div class="sf"><label>テロップ完了</label><input type="text" id="s2" readonly placeholder="—"></div>
        <div class="sf"><label>書き出し・チェック</label><input type="text" id="s3" readonly placeholder="—"></div>
      </div>
    </div>

    <div class="toggle-section">
      <div class="toggle-head" onclick="togglePanel('claude-body','claude-arr')">
        <span class="toggle-label">01</span>
        <span class="toggle-title">概要（Claude.md）</span>
        <span class="toggle-arrow" id="claude-arr">▼</span>
      </div>
      <div class="toggle-body" id="claude-body" style="display:none">
        <div class="claude-toolbar">
          <span class="claude-path" id="claude-path">${esc(p.claudePath||'ファイル未選択')}</span>
          <button class="claude-file-btn" onclick="pickClaudeFile()">ファイルを選択</button>
          <button class="claude-save-btn" onclick="downloadClaudeMd()">保存してDL</button>
        </div>
        <textarea class="claude-textarea" id="claude-text" placeholder="ファイルを選択するか、ここに直接貼り付けてください..."
          oninput="saveClaudeMd(this.value)">${esc(p.claudeMd||'')}</textarea>
      </div>
    </div>

    <div class="toggle-section">
      <div class="toggle-head" onclick="togglePanel('ref-body','ref-arr')">
        <span class="toggle-label">02</span>
        <span class="toggle-title">参考動画・リンク</span>
        <span class="toggle-arrow" id="ref-arr">▼</span>
      </div>
      <div class="toggle-body" id="ref-body" style="display:none">
        <div class="ref-list" id="ref-list">${refListHTML(p)}</div>
        <div class="ref-add-row">
          <input class="ref-input" id="ref-input" type="text" placeholder="URL またはメモを入力..." onkeydown="if(event.key==='Enter')addRef()">
          <button class="ref-add-btn" onclick="addRef()">追加</button>
        </div>
      </div>
    </div>

    <div class="sec-label">CHECKLIST</div>
    <div class="checklist-sec">
      <div class="cl-head cl-prep" onclick="toggleSec('prep','ap')">
        <span class="cl-num">01</span><span class="cl-ttl">編集の前準備</span><span class="cl-arr" id="ap">▲</span>
      </div>
      <div class="items" id="sec-prep">${prepSec}${addRowHTML('prep')}</div>
    </div>
    <div class="checklist-sec">
      <div class="cl-head cl-edit" onclick="toggleSec('edit','ae')">
        <span class="cl-num">02</span><span class="cl-ttl">編集開始</span><span class="cl-arr" id="ae">▲</span>
      </div>
      <div class="items" id="sec-edit">${editSec}${addRowHTML('edit')}</div>
    </div>
    <div class="checklist-sec">
      <div class="cl-head cl-confirm" onclick="toggleSec('confirm','ac')">
        <span class="cl-num">03</span><span class="cl-ttl">確認・納品</span><span class="cl-arr" id="ac">▲</span>
      </div>
      <div class="items" id="sec-confirm">${confirmSec}${addRowHTML('confirm')}</div>
    </div>

    <div class="sec-label">REFLECTION</div>
    <div class="card">
      <div class="refl-head">お疲れさまでした！</div>
      <div class="refl-sublabel">気づきと成果</div>
      <textarea class="refl-textarea" placeholder="この案件を通じての気づき、改善点、成果などを自由に記録してください..."
        oninput="saveReflection(this.value)">${esc(p.reflection||'')}</textarea>
    </div>`;

  if(p.deadline)calcDates(p.deadline);
  if(seqOpen){const sp=document.getElementById('seq-panel');if(sp)sp.classList.add('open');}
}

/* ---- ITEM HTML ---- */
function itemHTML(s,idx,checked,memo){
  const isSeq=(idx===SEQ_IDX);
  const num=String(idx+1).padStart(2,'0');
  const seqBtn=isSeq?`<div class="item-detail-btn" onclick="event.stopPropagation();toggleSeq()">シーケンス構成を確認 ▾</div>`:'';
  const seqPanel=isSeq?`<div class="seq-panel" id="seq-panel">
    <div class="seq-group"><div class="seq-group-label">VIDEO</div>
      ${SEQ_V.map(v=>`<div class="seq-row"><span class="seq-track">${v.k}</span><span class="seq-desc">${esc(v.d)}${v.s?` <small>— ${esc(v.s)}</small>`:''}</span></div>`).join('')}
    </div>
    <div class="seq-group"><div class="seq-group-label">AUDIO</div>
      ${SEQ_A.map(a=>`<div class="seq-row"><span class="seq-track">${a.k}</span><span class="seq-desc">${esc(a.d)}</span></div>`).join('')}
    </div>
  </div>`:'';
  return `<div class="item${checked?' done':''}">
    <div class="item-inner">
      <div class="item-left" onclick="togItem(${idx})">
        <div class="cb"><span class="ck">✓</span></div>
        <div class="item-body">
          <div class="it"><span style="font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;color:#FA6775;margin-right:6px">${num}</span>${esc(s.t)}</div>
          ${s.n?`<div class="in">${esc(s.n)}</div>`:''}
          ${seqBtn}
        </div>
      </div>
      <div class="item-right" onclick="event.stopPropagation()">
        <span class="memo-label">MEMO</span>
        <input class="item-memo-input" type="text" placeholder="" value="${esc(memo)}"
          onchange="saveMemo(${idx},this.value)" oninput="saveMemo(${idx},this.value)">
      </div>
    </div>
    ${seqPanel}
  </div>`;
}

function extraItemHTML(e,idx,sec,key,canUp,canDown,memo){
  const memoKey=`e${sec[0]}${idx}`;
  const upBtn=canUp
    ?`<button class="extra-action-btn" onclick="event.stopPropagation();moveInOrder('${sec}','${key}',-1)">▲</button>`
    :`<button class="extra-action-btn" disabled>▲</button>`;
  const downBtn=canDown
    ?`<button class="extra-action-btn" onclick="event.stopPropagation();moveInOrder('${sec}','${key}',1)">▼</button>`
    :`<button class="extra-action-btn" disabled>▼</button>`;
  return `<div class="item${e.done?' done':''}">
    <div class="item-inner">
      <div class="item-left" onclick="togExtra('${sec}',${idx})">
        <div class="cb"><span class="ck">✓</span></div>
        <div class="item-body">
          <div class="extra-text-wrap" id="etw-${sec}-${idx}">
            <span class="extra-badge">追加</span><span class="extra-text">${esc(e.t)}</span>
          </div>
          <div class="extra-edit-wrap" id="eew-${sec}-${idx}" style="display:none" onclick="event.stopPropagation()">
            <input class="extra-edit-input" id="eei-${sec}-${idx}" value="${esc(e.t)}"
              onkeydown="if(event.key==='Enter')saveExtra('${sec}',${idx})">
            <button class="extra-save-btn" onclick="event.stopPropagation();saveExtra('${sec}',${idx})">保存</button>
          </div>
        </div>
        <div class="extra-actions" onclick="event.stopPropagation()">
          ${upBtn}${downBtn}
          <button class="extra-action-btn" onclick="event.stopPropagation();startEditExtra('${sec}',${idx})">✎</button>
          <button class="extra-action-btn" onclick="event.stopPropagation();delExtra('${sec}',${idx})">×</button>
        </div>
      </div>
      <div class="item-right" onclick="event.stopPropagation()">
        <span class="memo-label">MEMO</span>
        <input class="item-memo-input" type="text" placeholder="" value="${esc(memo)}"
          onchange="saveMemoExtra('${memoKey}',this.value)" oninput="saveMemoExtra('${memoKey}',this.value)">
      </div>
    </div>
  </div>`;
}

/* ---- MEMO / REFLECTION ---- */
function saveMemo(idx,v){const p=getProj(currentId);if(!p)return;ensureMemos(p);p.memos[idx]=v;save();}
function saveMemoExtra(key,v){const p=getProj(currentId);if(!p)return;ensureMemos(p);p.memos[key]=v;save();}
function saveReflection(v){const p=getProj(currentId);if(!p)return;p.reflection=v;save();}

/* ---- CLAUDE MD ---- */
function pickClaudeFile(){
  const fp=document.getElementById('file-picker');
  fp.onchange=function(){
    const file=fp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const content=e.target.result;
      const p=getProj(currentId);if(!p)return;
      p.claudeMd=content;p.claudePath=file.name;save();
      const ta=document.getElementById('claude-text');
      const pa=document.getElementById('claude-path');
      if(ta)ta.value=content;if(pa)pa.textContent=file.name;
    };
    reader.readAsText(file,'UTF-8');
    fp.value='';
  };
  fp.click();
}
function saveClaudeMd(v){const p=getProj(currentId);if(!p)return;p.claudeMd=v;save();}
function downloadClaudeMd(){
  const p=getProj(currentId);if(!p)return;
  const ta=document.getElementById('claude-text');
  const content=ta?ta.value:(p.claudeMd||'');
  const blob=new Blob([content],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=p.claudePath||'claude.md';
  a.click();URL.revokeObjectURL(a.href);
}

/* ---- REFS ---- */
function refListHTML(p){
  if(!p.refs||!p.refs.length)return`<div class="ref-empty">まだありません</div>`;
  return p.refs.map((r,i)=>{
    const isUrl=/^https?:\/\//.test(r);
    return `<div class="ref-item">
      <div class="ref-text">${isUrl?`<a href="${esc(r)}" target="_blank">${esc(r)}</a>`:esc(r)}</div>
      <div class="ref-del" onclick="delRef(${i})">×</div>
    </div>`;
  }).join('');
}
function addRef(){
  const inp=document.getElementById('ref-input');
  const v=inp.value.trim();if(!v)return;
  const p=getProj(currentId);if(!p)return;
  if(!p.refs)p.refs=[];
  p.refs.push(v);save();
  document.getElementById('ref-list').innerHTML=refListHTML(p);
  inp.value='';
}
function delRef(i){
  const p=getProj(currentId);if(!p)return;
  p.refs.splice(i,1);save();
  document.getElementById('ref-list').innerHTML=refListHTML(p);
}

/* ---- ADD STEP ---- */
function addRowHTML(sec){
  return `<div class="add-step-row" id="addrow-${sec}">
    <div class="add-step-trigger" onclick="showAddInput('${sec}')">＋ 工程を追加</div>
    <div class="add-step-form" id="addform-${sec}" style="display:none">
      <input class="add-step-input" id="addinput-${sec}" type="text" placeholder="工程名を入力..." onkeydown="if(event.key==='Enter')submitExtra('${sec}')">
      <button class="add-step-btn" onclick="submitExtra('${sec}')">追加</button>
      <button class="add-step-cancel" onclick="hideAddInput('${sec}')">✕</button>
    </div>
  </div>`;
}
function showAddInput(sec){document.getElementById('addform-'+sec).style.display='flex';document.getElementById('addrow-'+sec).querySelector('.add-step-trigger').style.display='none';document.getElementById('addinput-'+sec).focus();}
function hideAddInput(sec){document.getElementById('addform-'+sec).style.display='none';document.getElementById('addrow-'+sec).querySelector('.add-step-trigger').style.display='';document.getElementById('addinput-'+sec).value='';}
function submitExtra(sec){
  const inp=document.getElementById('addinput-'+sec);
  const t=inp.value.trim();if(!t)return;
  const p=getProj(currentId);if(!p)return;
  ensureExtras(p);ensureOrder(p);
  const key='e'+p.extras[sec].length;
  p.extras[sec].push({t,done:false});
  p.order[sec].push(key);
  save();renderDetail();
}
function togExtra(sec,idx){const p=getProj(currentId);if(!p)return;ensureExtras(p);p.extras[sec][idx].done=!p.extras[sec][idx].done;save();renderDetail();}
function delExtra(sec,idx){
  const p=getProj(currentId);if(!p)return;
  ensureExtras(p);ensureOrder(p);ensureMemos(p);
  const key='e'+idx;
  p.order[sec]=p.order[sec].filter(k=>k!==key).map(k=>{
    if(typeof k==='string'&&k.startsWith('e')){const n=parseInt(k.slice(1));if(n>idx)return'e'+(n-1);}
    return k;
  });
  const sc=sec[0];
  const nm={};
  Object.entries(p.memos).forEach(([mk,mv])=>{
    if(mk.startsWith('e'+sc)){const n=parseInt(mk.slice(2));if(n===idx)return;nm['e'+sc+(n>idx?n-1:n)]=mv;}
    else nm[mk]=mv;
  });
  p.memos=nm;
  p.extras[sec].splice(idx,1);
  save();renderDetail();
}
function startEditExtra(sec,idx){
  document.getElementById('etw-'+sec+'-'+idx).style.display='none';
  document.getElementById('eew-'+sec+'-'+idx).style.display='flex';
  const inp=document.getElementById('eei-'+sec+'-'+idx);inp.focus();inp.select();
}
function saveExtra(sec,idx){
  const inp=document.getElementById('eei-'+sec+'-'+idx);
  const t=inp.value.trim();const p=getProj(currentId);if(!p||!t)return;
  ensureExtras(p);p.extras[sec][idx].t=t;save();renderDetail();
}
function moveInOrder(sec,key,dir){
  const p=getProj(currentId);if(!p)return;
  ensureOrder(p);
  const arr=p.order[sec],i=arr.indexOf(key);if(i<0)return;
  const ni=i+dir;if(ni<0||ni>=arr.length)return;
  [arr[i],arr[ni]]=[arr[ni],arr[i]];
  save();renderDetail();
}

/* ---- UTILS ---- */
function togglePanel(bodyId,arrId){
  const el=document.getElementById(bodyId);
  const ar=document.getElementById(arrId);
  const h=el.style.display==='none';
  el.style.display=h?'':'none';
  ar.textContent=h?'▲':'▼';
}
function toggleSeq(){
  seqOpen=!seqOpen;
  const sp=document.getElementById('seq-panel');if(sp)sp.classList.toggle('open',seqOpen);
  const btn=document.querySelector('.item-detail-btn');
  if(btn)btn.textContent=seqOpen?'シーケンス構成を確認 ▴':'シーケンス構成を確認 ▾';
}
function togItem(idx){const p=getProj(currentId);if(!p)return;p.checks[idx]=!p.checks[idx];save();renderDetail();}
function saveDl(v){const p=getProj(currentId);if(!p)return;p.deadline=v;save();calcDates(v);}
function calcDates(v){
  if(!v)return;
  const fmt=d=>{const m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return m+'/'+dd};
  const base=new Date(v);
  const sub=n=>{const x=new Date(base);x.setDate(x.getDate()-n);return x};
  const today=new Date();today.setHours(0,0,0,0);
  const deadline=new Date(v);deadline.setHours(0,0,0,0);
  const days=Math.round((deadline-today)/(1000*60*60*24));
  // カット1日／テロップ1日／演出2日（日にちがない場合は1日）／書き出し・チェック2日
  const tight=days<6;
  const s1=document.getElementById('s1'),s2=document.getElementById('s2'),s3=document.getElementById('s3');
  if(tight){
    if(s1)s1.value=fmt(sub(4)); // 粗カット完了
    if(s2)s2.value=fmt(sub(3)); // テロップ完了
    if(s3)s3.value=fmt(sub(1)); // 書き出し・チェック（納期前日）
  } else {
    if(s1)s1.value=fmt(sub(5)); // 粗カット完了
    if(s2)s2.value=fmt(sub(4)); // テロップ完了
    if(s3)s3.value=fmt(sub(1)); // 書き出し・チェック（納期前日）
  }
}
function toggleSec(id,aid){
  const el=document.getElementById('sec-'+id);const ar=document.getElementById(aid);
  const h=el.style.display==='none';el.style.display=h?'':'none';ar.textContent=h?'▲':'▼';
}
load();renderList();
</script>
</body>
</html>
