<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>oka_creative</title>
<link rel="apple-touch-icon" href="image/ロゴ.png">
<link rel="icon" href="image/ロゴ.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--red:#F52549;--pink:#D63070;--yellow:#F5B800;--green:#9BC01C;--navy:#1A1A1A;--gray:#999;--border:#EBEBEB}
body{background:#fff;min-height:100vh;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);padding-bottom:48px}

/* HERO */
.hero{background:var(--red);padding:28px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hero-eye{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.7);margin-bottom:3px}
.hero-title{font-size:26px;font-weight:900;color:#fff;line-height:1.1;letter-spacing:0.08em}
.hero-sub{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.7);margin-top:3px}
.hero-badge{background:rgba(255,255,255,0.2);border-radius:8px;padding:8px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:#fff;letter-spacing:1px;white-space:nowrap;flex-shrink:0}

/* COMMON */
.sec-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--red);margin:22px 20px 10px;display:flex;align-items:center;gap:8px}
.sec-label::after{content:'';flex:1;height:1.5px;background:var(--red);opacity:0.2}
.card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;margin:0 16px 10px}

/* LIST */
.proj-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.proj-item:last-child{border-bottom:none}
.proj-item:hover{background:#FAFAFA}
.proj-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0}
.proj-name{flex:1;font-size:14px;font-weight:700}
.proj-tag{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:1.5px;padding:3px 8px;border-radius:20px;color:#fff;flex-shrink:0}
.proj-prog{font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--gray)}
.proj-del{font-size:16px;color:#DDD;padding:4px 6px;border-radius:6px;transition:color 0.15s}
.proj-del:hover{color:var(--red)}
.add-row{display:flex;gap:8px;margin:0 16px 0}
.add-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none;background:#fff}
.add-input::placeholder{color:#CCC;font-weight:400}
.add-input:focus{border-color:var(--red)}
.add-btn{background:var(--red);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;cursor:pointer}
.add-btn:hover{opacity:0.88}

/* DETAIL HEADER */
.back-btn{display:flex;align-items:center;gap:6px;margin:16px 16px 0;font-family:'Nunito',sans-serif;font-size:12px;letter-spacing:1px;color:var(--gray);cursor:pointer;width:fit-content}
.back-btn:hover{color:var(--red)}
.title-row{display:flex;align-items:center;gap:8px;margin:6px 20px 0}
.proj-title-bar{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:900;color:var(--navy);flex:1;border:none;background:transparent;outline:none;padding:0}
.proj-title-bar:focus{border-bottom:2px solid var(--red)}
.title-edit-btn{font-size:11px;font-weight:700;color:var(--gray);cursor:pointer;white-space:nowrap;padding:4px 8px;border:1.5px solid var(--border);border-radius:6px;transition:all 0.15s;font-family:'Nunito',sans-serif}
.title-edit-btn:hover{border-color:var(--red);color:var(--red)}
.style-row{display:flex;align-items:center;gap:10px;margin:10px 20px 0;flex-wrap:wrap}
.style-row input[type="text"]{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;outline:none;width:150px;color:var(--navy)}
.style-row input[type="text"]:focus{border-color:var(--red)}
.style-row label{display:flex;align-items:center;gap:4px;font-family:'Nunito',sans-serif;font-size:10px;color:var(--gray)}
.style-row input[type="color"]{width:26px;height:26px;border:none;cursor:pointer;border-radius:6px}

/* PROGRESS */
.prog-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.prog-num{font-family:'Nunito',sans-serif;font-size:30px;font-weight:900;color:var(--red)}
.prog-count{font-size:11px;color:var(--gray)}
.track{background:var(--border);border-radius:99px;height:6px;overflow:hidden}
.fill{height:100%;border-radius:99px;background:#FFD64D;transition:width 0.3s ease}

/* SCHEDULE */
.sch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sf label{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:1.5px;color:var(--gray);display:block;margin-bottom:5px}
.sf input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.sf input:focus{border-color:var(--green)}
.sf input[readonly]{color:var(--gray)}

/* TOGGLE PANELS */
.toggle-section{margin:0 16px 10px;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
.toggle-head{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;transition:background 0.15s}
.toggle-head:hover{background:#FAFAFA}
.toggle-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:var(--red);margin-right:4px}
.toggle-title{flex:1;font-size:13px;font-weight:700;color:var(--navy)}
.toggle-arrow{font-size:11px;color:var(--gray)}
.toggle-body{border-top:1px solid var(--border);background:#FAFCFF}

/* OVERVIEW (file toolbar, still used for md load/download) */
.claude-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:#fff;flex-wrap:wrap}
.claude-path{flex:1;font-size:12px;color:var(--gray);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.claude-file-btn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;padding:6px 12px;border-radius:7px;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:#fff;color:var(--gray);transition:all 0.15s}
.claude-file-btn:hover{border-color:var(--red);color:var(--red)}
.claude-save-btn{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;padding:6px 12px;border-radius:7px;cursor:pointer;white-space:nowrap;border:none;background:var(--red);color:#fff}
.claude-save-btn:hover{opacity:0.88}
#file-picker{display:none}

/* OVERVIEW (markdown preview/edit) */
.overview-block{padding:14px 16px}
.overview-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);resize:none;outline:none;line-height:1.8;min-height:80px;background:#fff;overflow:hidden;display:none}
.overview-textarea:focus{border-color:var(--red)}
.overview-preview{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);line-height:1.8;min-height:60px;background:#fff;cursor:pointer}
.overview-preview h1,.overview-preview h2,.overview-preview h3{font-weight:900;margin:8px 0 4px;color:var(--navy)}
.overview-preview h1{font-size:16px}.overview-preview h2{font-size:14px}.overview-preview h3{font-size:13px}
.overview-preview p{margin:4px 0}
.overview-preview table{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px}
.overview-preview th,.overview-preview td{border:1px solid var(--border);padding:5px 8px;text-align:left}
.overview-preview th{background:#f5f5f5;font-weight:700}
.overview-preview ul,.overview-preview ol{padding-left:18px;margin:4px 0}
.overview-preview li{margin:2px 0}
.overview-preview strong{font-weight:900}
.overview-preview em{font-style:italic;color:var(--gray)}
.overview-preview hr{border:none;border-top:1px solid var(--border);margin:8px 0}
.overview-preview code{background:#f5f5f5;padding:1px 5px;border-radius:4px;font-size:12px}
.overview-edit-hint{font-size:11px;color:#CCC;margin-top:4px;font-family:'Nunito',sans-serif}
.overview-save-btn{margin-top:6px;background:var(--red);color:#fff;border:none;border-radius:7px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer;display:none}
.overview-cancel-btn{margin-top:6px;margin-left:6px;background:none;border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;font-size:11px;color:var(--gray);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;display:none}

/* PALETTE */
.palette-group{padding:10px 16px 4px}
.palette-group-header{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.palette-group-label{font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:900;color:var(--navy);flex:1}
.group-del-btn{font-size:11px;color:#DDD;cursor:pointer;padding:2px 5px;border:none;background:none;border-radius:4px;transition:color 0.15s;font-family:'Nunito',sans-serif;font-weight:700}
.group-del-btn:hover{color:var(--red)}
.color-row{display:grid;grid-template-columns:36px minmax(80px,180px) minmax(80px,260px) max-content max-content;align-items:center;gap:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.color-row:last-child{border-bottom:none}
.color-swatch{width:32px;height:32px;border-radius:7px;flex-shrink:0;border:1px solid rgba(0,0,0,0.06)}
.color-label{min-width:0}
.color-name{font-size:12px;font-weight:700;color:var(--navy)}
.color-role{font-size:11px;color:var(--gray);line-height:1.4;margin-top:1px}
.color-code-wrap{display:flex;align-items:center;gap:5px}
.color-code{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--gray);letter-spacing:1px;white-space:nowrap}
.copy-btn{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;padding:4px 8px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--gray);cursor:pointer;transition:all 0.15s;white-space:nowrap}
.copy-btn:hover{border-color:var(--red);color:var(--red)}
.copy-btn.copied{border-color:var(--green);color:var(--green);background:#F6FFF0}
.color-action-btns{display:flex;align-items:center;gap:2px}
.color-edit-btn{font-size:12px;color:#DDD;cursor:pointer;padding:3px 5px;border:none;background:none;border-radius:4px;transition:color 0.15s;line-height:1}
.color-edit-btn:hover{color:var(--red)}
.color-edit-form{display:none;padding:8px 0 4px}
.color-edit-inner{display:flex;flex-direction:column;gap:6px}
.color-edit-field{display:flex;align-items:center;gap:6px}
.color-edit-field label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:var(--gray);min-width:36px}
.color-edit-field input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);outline:none}
.color-edit-field input:focus{border-color:var(--red)}
.color-edit-btns{display:flex;gap:6px;justify-content:flex-end;margin-top:2px}
.btn-save{background:var(--red);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer}
.btn-cancel{background:none;border:1.5px solid var(--border);border-radius:7px;padding:7px 12px;font-size:11px;color:var(--gray);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700}

/* ADD COLOR / GROUP */
.add-color-row{padding:8px 16px 10px;border-top:1px dashed var(--border)}
.add-color-trigger{font-size:12px;font-weight:700;color:#CCC;cursor:pointer;font-family:'Nunito',sans-serif;transition:color 0.15s}
.add-color-trigger:hover{color:var(--red)}
.add-color-form{display:none;flex-direction:column;gap:6px}
.add-color-field{display:flex;align-items:center;gap:6px}
.add-color-field label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:var(--gray);min-width:36px}
.add-color-field input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);outline:none}
.add-color-field input:focus{border-color:var(--red)}
.add-color-btns{display:flex;gap:6px;justify-content:flex-end}
.add-group-row{padding:8px 16px 12px;display:flex;gap:8px;border-top:1px solid var(--border)}
.add-group-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);outline:none}
.add-group-input:focus{border-color:var(--red)}
.add-group-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}

/* REFS */
.ref-list-inner{padding:4px 0}
.ref-item{display:flex;align-items:flex-start;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border)}
.ref-item:last-child{border-bottom:none}
.ref-label-tag{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;background:#FFF0F2;color:var(--red);padding:2px 6px;border-radius:4px;flex-shrink:0;margin-top:2px;white-space:nowrap}
.ref-text{flex:1;font-size:13px;color:var(--navy);word-break:break-all;line-height:1.5}
.ref-text a{color:var(--red);text-decoration:none}
.ref-text a:hover{text-decoration:underline}
.ref-action-btn{font-size:12px;color:#DDD;cursor:pointer;padding:2px 4px;border:none;background:none;border-radius:4px;transition:color 0.15s;line-height:1;flex-shrink:0}
.ref-action-btn:hover{color:var(--red)}
.ref-empty{padding:16px;font-size:12px;color:#CCC;text-align:center;font-family:'Nunito',sans-serif}
.ref-add-area{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;background:#fff}
.ref-add-row{display:flex;gap:6px;align-items:center}
.ref-add-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:var(--gray);min-width:36px}
.ref-add-input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);outline:none}
.ref-add-input:focus{border-color:var(--red)}
.ref-add-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}

/* CHECKLIST */
.checklist-sec{margin:0 16px 4px}
.checklist-sec+.checklist-sec{margin-top:10px}
.cl-head{display:flex;align-items:center;gap:10px;padding:11px 16px;border-radius:10px;cursor:pointer;user-select:none;margin-bottom:6px}
.cl-prep{background:var(--green)}
.cl-edit{background:var(--yellow)}
.cl-confirm{background:var(--red)}
.cl-num{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:rgba(255,255,255,0.85)}
.cl-ttl{font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;flex:1;color:#fff}
.cl-arr{font-size:11px;color:rgba(255,255,255,0.65)}
.items{background:#fff;border:1.5px solid var(--border);border-radius:10px;overflow:hidden}
.item{border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
/* 2-col layout: left=content, right=MEMO */
.item-inner{display:flex;align-items:stretch}
.item-left{flex:1;display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;transition:background 0.15s;min-width:0}
.item-left:hover{background:#FAFAFA}
.item.done .item-left{background:#FFFDF0}
.item-body{flex:1;min-width:0}
.item-right{flex:1;border-left:1px dashed var(--border);display:flex;align-items:flex-start;gap:6px;padding:8px 12px}
.memo-label{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#CCC;flex-shrink:0;letter-spacing:1px;margin-top:4px}
.item-memo-input{flex:1;border:none;padding:3px 2px;font-size:12px;font-family:'Zen Maru Gothic',sans-serif;color:var(--gray);outline:none;background:transparent;min-width:0;resize:vertical;min-height:34px;line-height:1.5;white-space:pre-wrap}
.item-memo-input::placeholder{color:#DDD}
.item-memo-input:focus{border-color:var(--red);color:var(--navy)}
.cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.item.done .cb{background:#FFD64D;border-color:#FFD64D}
.ck{display:none;color:#fff;font-size:13px;font-weight:900}
.item.done .ck{display:block}
.it{font-size:14px;font-weight:700;color:var(--navy);line-height:1.45}
.item.done .it{color:#CCC;text-decoration:line-through}
.in{font-size:11px;color:#BBB;margin-top:2px;line-height:1.5}
.item-detail-btn{font-size:11px;color:#FA6775;font-weight:700;margin-top:3px;cursor:pointer;display:inline-block}
.item-detail-btn:hover{text-decoration:underline}

/* SEQ PANEL */
.seq-panel{display:none;background:#FFF8F8;border-top:1px solid var(--border);padding:14px 16px}
.seq-panel.open{display:block}
.seq-group{margin-bottom:12px}
.seq-group:last-child{margin-bottom:0}
.seq-group-label{font-family:'Nunito',sans-serif;font-size:10px;letter-spacing:2px;color:#FA6775;margin-bottom:6px;font-weight:900}
.seq-row{display:flex;gap:8px;margin-bottom:4px;align-items:baseline}
.seq-row:last-child{margin-bottom:0}
.seq-track{font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;color:var(--red);min-width:36px;flex-shrink:0}
.seq-desc{font-size:12px;color:var(--navy);line-height:1.4}
.seq-desc small{color:var(--gray);font-size:11px}

/* ADD STEP */
.add-step-row{padding:10px 16px;border-top:1px solid var(--border)}
.add-step-trigger{font-size:12px;font-weight:700;color:#CCC;cursor:pointer;font-family:'Nunito',sans-serif;transition:color 0.15s}
.add-step-trigger:hover{color:var(--red)}
.add-step-form{display:flex;gap:6px;align-items:center}
.add-step-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.add-step-input:focus{border-color:var(--red)}
.add-step-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;cursor:pointer;white-space:nowrap}
.add-step-cancel{background:none;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--gray);cursor:pointer}

/* REFLECTION */
.refl-head{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:6px}
.refl-sublabel{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:var(--gray);margin-bottom:8px}
.refl-textarea{width:100%;min-height:120px;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;font-family:'Zen Maru Gothic',sans-serif;color:var(--navy);resize:vertical;outline:none;line-height:1.8}
.refl-textarea:focus{border-color:var(--green)}

/* EXTRA ITEMS */
.extra-badge{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;color:#FA6775;background:#FFF0F2;padding:1px 5px;border-radius:4px;margin-right:6px}
.extra-text{font-size:14px;font-weight:700;color:var(--navy)}
.item.done .extra-text{color:#CCC;text-decoration:line-through}
.extra-edit-wrap{display:flex;gap:6px;align-items:center;width:100%}
.extra-edit-input{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:6px 9px;font-size:13px;font-weight:700;color:var(--navy);font-family:'Zen Maru Gothic',sans-serif;outline:none}
.extra-edit-input:focus{border-color:var(--red)}
.extra-save-btn{background:var(--red);color:#fff;border:none;border-radius:7px;padding:6px 10px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;cursor:pointer;white-space:nowrap}
.extra-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;margin-left:4px}
.extra-action-btn{font-size:13px;color:#CCC;padding:3px 5px;cursor:pointer;border-radius:4px;transition:color 0.15s;line-height:1;user-select:none;background:none;border:none;font-family:inherit}
.extra-action-btn:hover:not(:disabled){color:var(--red)}
.extra-action-btn:disabled{opacity:0.2;cursor:default}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:10px 20px;border-radius:20px;opacity:0;transition:all 0.2s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<body>

<div class="hero">
  <div class="hero-left">
    <div class="hero-eye">VIDEO EDITING</div>
    <div class="hero-title">動画編集完全ワークフロー</div>
    <div class="hero-sub">COMPLETE WORKFLOW</div>
  </div>
  <div class="hero-badge">WORKFLOW</div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="file-picker" accept=".md,.txt">
<div id="view-list"></div>
<div id="view-client" style="display:none"></div>
<div id="view-project" style="display:none"></div>

<script>
const STEPS_PREP=[
  {t:'ディレクトリを作る'},
  {t:'案件概要確認 → Claudeに送って .md作成',n:'クライアント情報・トンマナ・報酬・納期・請求情報'},
  {t:'素材受け取り・ダウンロード',n:'当日または遅くても翌日 ／ ギガファイル便にバックアップ'},
  {t:'素材整理（各ディレクトリに格納）'},
  {t:'参考動画リサーチ・ダウンロード',n:'YouTube限定公開 ／ ディレクトリに格納'},
];
const STEPS_EDIT=[
  {t:'Premiere Pro に素材を入れる'},
  {t:'基本音声調整',n:'カット前にここでやる'},
  {t:'基本色調調整'},
  {t:'基本スケール調整（必要な場合のみ）'},
  {t:'シーケンスを作り、動画を配置する',n:'V1–V14 ／ A1–A6 構成',seq:true},
  {t:'粗カット',n:'完全に不要な部分のみ ／ テンポは意識しない'},
  {t:'インサート配置'},
  {t:'細かいカット',n:'テンポを意識 ／ 声の開始部分に合わせてカット'},
  {t:'テロップ文字起こし'},
  {t:'テロップ作成'},
  {t:'BGM配置'},
  {t:'画像・イラスト挿入'},
  {t:'SE配置'},
];
const STEPS_CONFIRM=[
  {t:'書き出し'},
  {t:'チェック',n:'別チェックリストで確認'},
  {t:'納品・連絡'},
];
const ALL=[...STEPS_PREP,...STEPS_EDIT,...STEPS_CONFIRM];
const TOTAL=ALL.length;
const SEQ_IDX=STEPS_PREP.length+4;

const SEQ_V=[
  {k:'V1',d:'カラーマット'},
  {k:'V2',d:'メイン映像①'},
  {k:'V3',d:'メイン映像②'},
  {k:'V4',d:'調整レイヤー',s:'色調補正用'},
  {k:'V5',d:'調整レイヤー',s:'トランスフォーム用'},
  {k:'V6',d:'左上素材',s:'基本ずっと置いてあるやつ'},
  {k:'V7',d:'右上素材',s:'基本ずっと置いてあるやつ'},
  {k:'V8',d:'基本テロップ'},
  {k:'V9',d:'対話者テロップ'},
  {k:'V10',d:'強調テロップ背景素材'},
  {k:'V11',d:'強調テロップ'},
  {k:'V12',d:'インサート①'},
  {k:'V13',d:'インサート②'},
  {k:'V14',d:'インサート③'},
];
const SEQ_A=[
  {k:'A1',d:'メイン音声①'},
  {k:'A2',d:'メイン音声②'},
  {k:'A3',d:'SE①'},
  {k:'A4',d:'SE②'},
  {k:'A5',d:'BGM①'},
  {k:'A6',d:'BGM②'},
];

const KEY='oka_hub_v2';
let state={clients:[]};
let currentClientId=null;
let currentVideoId=null;
let seqOpen=false;

/* ---- LOAD / MIGRATION ---- */
function load(){
  try{
    const d=localStorage.getItem(KEY);
    if(d){state=JSON.parse(d);return;}
  }catch(e){}
  state={clients:buildClientsFromLegacy()};
  save();
}
function legacyFlatList(){
  try{
    const d=localStorage.getItem('oka_hub_v1');
    if(d){const parsed=JSON.parse(d);if(parsed&&parsed.projects)return parsed.projects;}
  }catch(e){}
  let wf=[],sb=[];
  try{const d=localStorage.getItem('cl_mp_v4');if(d)wf=(JSON.parse(d).projects)||[];}catch(e){}
  try{const d=localStorage.getItem('style_book_v7');if(d)sb=(JSON.parse(d).projects)||[];}catch(e){}
  if(!wf.length&&!sb.length)return[];
  const merged=[];
  const usedSbIds=new Set();
  wf.forEach(w=>{
    const match=sb.find(s=>s.name===w.name);
    if(match)usedSbIds.add(match.id);
    const refs=[];
    if(match&&match.refs)match.refs.forEach(r=>refs.push({label:r.label||'',url:r.url||''}));
    if(w.refs)w.refs.forEach(r=>{if(typeof r==='string'&&r)refs.push({label:'',url:r});});
    merged.push({
      id:w.id,name:w.name,
      dotColor:match?(match.dotColor||'#999999'):'#999999',
      tag:match?(match.tag||''):'',
      tagColor:match?(match.tagColor||'#999999'):'#999999',
      deadline:w.deadline||'',
      checks:w.checks||Array(TOTAL).fill(false),
      extras:w.extras||{prep:[],edit:[],confirm:[]},
      memos:w.memos||{},
      order:w.order,
      overview:(match&&match.overview)?match.overview:(w.claudeMd||''),
      claudePath:w.claudePath||'',
      refs:refs,
      palette:match?(match.palette||[]):[],
      reflection:w.reflection||''
    });
  });
  sb.forEach(s=>{
    if(usedSbIds.has(s.id))return;
    merged.push({
      id:s.id,name:s.name,
      dotColor:s.dotColor||'#999999',
      tag:s.tag||'',
      tagColor:s.tagColor||'#999999',
      deadline:'',
      checks:Array(TOTAL).fill(false),
      extras:{prep:[],edit:[],confirm:[]},
      memos:{},
      order:undefined,
      overview:s.overview||'',
      claudePath:'',
      refs:(s.refs||[]).map(r=>({label:r.label||'',url:r.url||''})),
      palette:s.palette||[],
      reflection:''
    });
  });
  return merged;
}
function flatToVideo(p){
  return {
    id:p.id,name:p.name,deadline:p.deadline||'',
    checks:p.checks||Array(TOTAL).fill(false),
    extras:p.extras||{prep:[],edit:[],confirm:[]},
    memos:p.memos||{},
    order:p.order,
    reflection:p.reflection||''
  };
}
function flatToClient(p){
  return {
    id:'c'+p.id,name:p.name,
    dotColor:p.dotColor||'#999999',tag:p.tag||'',tagColor:p.tagColor||'#999999',
    overview:p.overview||'',claudePath:p.claudePath||'',
    refs:p.refs||[],palette:p.palette||[],
    projects:[flatToVideo(p)]
  };
}
function buildClientsFromLegacy(){
  const flat=legacyFlatList();
  if(!flat.length)return[];
  // 手作業指定：この2件だけは同一クライアントとして統合する
  const camp=flat.find(p=>p.name==='新日本空調サービス_キャンプ動画');
  const japas=flat.find(p=>p.name==='JAPAS CHANNEL');
  const clients=[];
  const usedIds=new Set();
  if(camp&&japas){
    usedIds.add(camp.id);usedIds.add(japas.id);
    clients.push({
      id:'c_shinnihon_kucho',
      name:'新日本空調サービス',
      dotColor:japas.dotColor||'#0056A5',
      tag:japas.tag||'JAPAS CHANNEL',
      tagColor:japas.tagColor||'#FF0000',
      overview:japas.overview||'',
      claudePath:'',
      refs:japas.refs||[],
      palette:japas.palette||[],
      projects:[{...flatToVideo(camp),name:'キャンプ動画'}]
    });
  }
  // それ以外は安全側：1案件＝1クライアント×1動画としてそのまま昇格
  flat.forEach(p=>{
    if(usedIds.has(p.id))return;
    clients.push(flatToClient(p));
  });
  return clients;
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state))}catch(e){}}
function getClient(id){return state.clients.find(c=>c.id===id);}
function getCurrentClient(){return getClient(currentClientId);}
function getCurrentVideo(){const c=getCurrentClient();if(!c)return null;return (c.projects||[]).find(v=>v.id===currentVideoId);}
function ensureExtras(v){if(!v.extras)v.extras={prep:[],edit:[],confirm:[]};}
function ensureMemos(v){if(!v.memos)v.memos={};}
function ensureOrder(v){
  ensureExtras(v);
  if(!v.order)v.order={};
  const lens={prep:STEPS_PREP.length,edit:STEPS_EDIT.length,confirm:STEPS_CONFIRM.length};
  ['prep','edit','confirm'].forEach(sec=>{
    if(!v.order[sec]){
      const stdKeys=Array.from({length:lens[sec]},(_,i)=>i);
      const extraKeys=v.extras[sec].map((_,i)=>'e'+i);
      v.order[sec]=[...stdKeys,...extraKeys];
    }
  });
}
function totalSteps(v){ensureExtras(v);return TOTAL+v.extras.prep.length+v.extras.edit.length+v.extras.confirm.length;}
function doneCnt(v){ensureExtras(v);const base=v.checks.filter(Boolean).length;const ex=Object.values(v.extras).flat().filter(e=>e.done).length;return base+ex;}
function pct(v){const t=totalSteps(v);return t?Math.round(doneCnt(v)/t*100):0;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

/* ---- Toast ---- */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

/* ---- VIEW SWITCH ---- */
function showClientList(){
  currentClientId=null;currentVideoId=null;save();
  document.getElementById('view-list').style.display='';
  document.getElementById('view-client').style.display='none';
  document.getElementById('view-project').style.display='none';
  seqOpen=false;renderClientList();
}
function openClient(id){
  currentClientId=id;currentVideoId=null;seqOpen=false;save();
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-client').style.display='';
  document.getElementById('view-project').style.display='none';
  renderClientDetail();
}
function openVideo(id){
  currentVideoId=id;seqOpen=false;save();
  document.getElementById('view-list').style.display='none';
  document.getElementById('view-client').style.display='none';
  document.getElementById('view-project').style.display='';
  renderVideoDetail();
}
function backToClient(){
  currentVideoId=null;seqOpen=false;save();
  document.getElementById('view-client').style.display='';
  document.getElementById('view-project').style.display='none';
  renderClientDetail();
}

/* ---- CLIENT LIST ---- */
function renderClientList(){
  const el=document.getElementById('view-list');
  const cs=state.clients;
  el.innerHTML=`
    <div class="sec-label">クライアント一覧</div>
    ${cs.length===0?`<div class="card" style="color:#CCC;font-size:13px;text-align:center;padding:24px">クライアントがまだいません</div>`:`
    <div class="card" style="padding:0">
      ${cs.map(c=>`
        <div class="proj-item" onclick="openClient('${c.id}')">
          <div class="proj-dot" style="background:${c.dotColor&&c.dotColor!=='#999999'?esc(c.dotColor):'var(--border)'}"></div>
          <div class="proj-name">${esc(c.name)}</div>
          ${c.tag?`<div class="proj-tag" style="background:${esc(c.tagColor||'#999999')}">${esc(c.tag)}</div>`:''}
          <div class="proj-prog">${(c.projects||[]).length}本</div>
          <div class="proj-del" onclick="event.stopPropagation();delClient('${c.id}')">×</div>
        </div>`).join('')}
    </div>`}
    <div class="sec-label" style="margin-top:20px">新しいクライアントを追加</div>
    <div class="add-row">
      <input class="add-input" id="new-client-name" type="text" placeholder="クライアント名を入力..." onkeydown="if(event.key==='Enter')addClient()">
      <button class="add-btn" onclick="addClient()">追加</button>
    </div>`;
}
function addClient(){
  const inp=document.getElementById('new-client-name');
  const name=inp.value.trim();if(!name)return;
  const c={id:'c'+Date.now(),name,dotColor:'#999999',tag:'',tagColor:'#999999',overview:'',claudePath:'',refs:[],palette:[],projects:[]};
  state.clients.push(c);save();openClient(c.id);
}
function delClient(id){
  if(!confirm('このクライアントを削除しますか？（中の動画案件もすべて削除されます）'))return;
  state.clients=state.clients.filter(c=>c.id!==id);
  if(currentClientId===id){showClientList();}else{save();renderClientList();}
}

/* ---- TITLE EDIT (client名 / 動画名 共用) ---- */
function startEditTitle(){
  const inp=document.getElementById('title-input');
  inp.removeAttribute('readonly');inp.focus();inp.select();
  document.getElementById('title-edit-btn').textContent='保存';
  document.getElementById('title-edit-btn').onclick=saveTitle;
}
function saveTitle(){
  const inp=document.getElementById('title-input');
  const v=inp.value.trim();
  if(currentVideoId){
    const vid=getCurrentVideo();if(!vid)return;if(v)vid.name=v;inp.value=vid.name;
  }else{
    const c=getCurrentClient();if(!c)return;if(v)c.name=v;inp.value=c.name;
  }
  inp.setAttribute('readonly','');
  document.getElementById('title-edit-btn').textContent='編集';
  document.getElementById('title-edit-btn').onclick=startEditTitle;
  save();renderClientList();
}

/* ---- TAG / DOT COLOR (client単位) ---- */
function saveTag(v){const c=getCurrentClient();if(!c)return;c.tag=v;save();renderClientList();}
function saveTagColor(v){const c=getCurrentClient();if(!c)return;c.tagColor=v;save();renderClientList();}
function saveDotColor(v){const c=getCurrentClient();if(!c)return;c.dotColor=v;save();renderClientList();}

/* ---- CLIENT DETAIL ---- */
function videoItemHTML(v){
  const p=pct(v);
  return `<div class="proj-item" onclick="openVideo('${v.id}')">
    <div class="proj-dot" style="${p>0?'background:var(--red)':''}"></div>
    <div class="proj-name">${esc(v.name)}</div>
    <div class="proj-prog" style="${p>0?'color:var(--red)':''}">${p}%</div>
    <div class="proj-del" onclick="event.stopPropagation();delVideo('${v.id}')">×</div>
  </div>`;
}
function renderClientDetail(){
  const c=getCurrentClient();if(!c)return showClientList();
  if(!c.palette)c.palette=[];
  if(!c.refs)c.refs=[];
  if(!c.projects)c.projects=[];

  document.getElementById('view-client').innerHTML=`
    <div class="back-btn" onclick="showClientList()">← クライアント一覧</div>
    <div class="title-row">
      <input class="proj-title-bar" id="title-input" value="${esc(c.name)}" readonly onkeydown="if(event.key==='Enter')saveTitle()">
      <div class="title-edit-btn" id="title-edit-btn" onclick="startEditTitle()">編集</div>
    </div>
    <div class="style-row">
      <input type="text" id="tag-input" value="${esc(c.tag||'')}" placeholder="タグ（YouTube など）" onchange="saveTag(this.value)">
      <label>タグ色<input type="color" id="tagcolor-input" value="${esc(c.tagColor||'#999999')}" onchange="saveTagColor(this.value)"></label>
      <label>ドット色<input type="color" id="dotcolor-input" value="${esc(c.dotColor||'#999999')}" onchange="saveDotColor(this.value)"></label>
    </div>

    <div class="toggle-section">
      <div class="toggle-head" onclick="togglePanel('ov-body','ov-arr')">
        <span class="toggle-label">01</span>
        <span class="toggle-title">概要</span>
        <span class="toggle-arrow" id="ov-arr">▼</span>
      </div>
      <div class="toggle-body" id="ov-body" style="display:none">
        <div class="claude-toolbar">
          <span class="claude-path" id="claude-path">${esc(c.claudePath||'ファイル未選択')}</span>
          <button class="claude-file-btn" onclick="pickOverviewFile()">ファイルを選択</button>
          <button class="claude-save-btn" onclick="downloadOverview()">保存してDL</button>
        </div>
        <div class="overview-block">
          <div class="overview-preview" id="ov-preview" onclick="startEditOverview()">${c.overview?marked.parse(c.overview):'<span style="color:#CCC">クリックして編集...</span>'}</div>
          <textarea class="overview-textarea" id="ov-ta" placeholder="マークダウンで入力できます（# 見出し、**太字**、| テーブル | など）" oninput="autoResizeTextarea(this)">${esc(c.overview||'')}</textarea>
          <div class="overview-edit-hint" id="ov-hint">クリックで編集</div>
          <div>
            <button class="overview-save-btn" id="ov-save" onclick="saveOverview()">保存</button>
            <button class="overview-cancel-btn" id="ov-cancel" onclick="cancelEditOverview()">キャンセル</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toggle-section">
      <div class="toggle-head" onclick="togglePanel('pal-body','pal-arr')">
        <span class="toggle-label">02</span>
        <span class="toggle-title">カラーパレット</span>
        <span class="toggle-arrow" id="pal-arr">▼</span>
      </div>
      <div class="toggle-body" id="pal-body" style="display:none">
        ${renderPalette(c)}
      </div>
    </div>

    <div class="toggle-section">
      <div class="toggle-head" onclick="togglePanel('ref-body','ref-arr')">
        <span class="toggle-label">03</span>
        <span class="toggle-title">参考リンク</span>
        <span class="toggle-arrow" id="ref-arr">▼</span>
      </div>
      <div class="toggle-body" id="ref-body" style="display:none">
        <div class="ref-list-inner" id="ref-list">${refListHTML(c)}</div>
        <div class="ref-add-area">
          <div class="ref-add-row">
            <span class="ref-add-label">ラベル</span>
            <input class="ref-add-input" id="ref-label-input" type="text" placeholder="公式サイト など">
          </div>
          <div class="ref-add-row">
            <span class="ref-add-label">URL</span>
            <input class="ref-add-input" id="ref-url-input" type="text" placeholder="https://..." onkeydown="if(event.key==='Enter')addRef()">
            <button class="ref-add-btn" onclick="addRef()">追加</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sec-label">04　案件進捗</div>
    ${c.projects.length===0?`<div class="card" style="color:#CCC;font-size:13px;text-align:center;padding:20px">動画案件がまだありません</div>`:`
    <div class="card" style="padding:0">
      ${c.projects.map(v=>videoItemHTML(v)).join('')}
    </div>`}
    <div class="add-row" style="margin-top:10px">
      <input class="add-input" id="new-video-name" type="text" placeholder="動画名を入力..." onkeydown="if(event.key==='Enter')addVideo()">
      <button class="add-btn" onclick="addVideo()">追加</button>
    </div>`;
}
function addVideo(){
  const c=getCurrentClient();if(!c)return;
  const inp=document.getElementById('new-video-name');
  const name=inp.value.trim();if(!name)return;
  if(!c.projects)c.projects=[];
  c.projects.push({id:'v'+Date.now(),name,deadline:'',checks:Array(TOTAL).fill(false)});
  save();renderClientDetail();
}
function delVideo(id){
  if(!confirm('この動画案件を削除しますか？'))return;
  const c=getCurrentClient();if(!c)return;
  c.projects=c.projects.filter(v=>v.id!==id);
  save();renderClientDetail();
}

/* ---- VIDEO DETAIL ---- */
function renderSection(sec,stdSteps,stdOffset,v){
  ensureOrder(v);
  return v.order[sec].map(key=>{
    if(typeof key==='number'){
      const idx=stdOffset+key;
      return itemHTML(stdSteps[key],idx,v.checks[idx],v.memos[idx]||'');
    }
    const eIdx=parseInt(key.slice(1));
    const e=v.extras[sec][eIdx];
    if(!e)return'';
    const arr=v.order[sec],pos=arr.indexOf(key);
    return extraItemHTML(e,eIdx,sec,key,pos>0,pos<arr.length-1,v.memos['e'+sec[0]+eIdx]||'');
  }).join('');
}
function renderVideoDetail(){
  const c=getCurrentClient();if(!c)return showClientList();
  const v=getCurrentVideo();
  if(!v){backToClient();return;}
  ensureExtras(v);ensureMemos(v);ensureOrder(v);
  const done=doneCnt(v),total=totalSteps(v),perc=Math.round(done/total*100);
  const eo=STEPS_PREP.length,co=eo+STEPS_EDIT.length;
  const prepSec=renderSection('prep',STEPS_PREP,0,v);
  const editSec=renderSection('edit',STEPS_EDIT,eo,v);
  const confirmSec=renderSection('confirm',STEPS_CONFIRM,co,v);

  document.getElementById('view-project').innerHTML=`
    <div class="back-btn" onclick="backToClient()">← ${esc(c.name)}</div>
    <div class="title-row">
      <input class="proj-title-bar" id="title-input" value="${esc(v.name)}" readonly onkeydown="if(event.key==='Enter')saveTitle()">
      <div class="title-edit-btn" id="title-edit-btn" onclick="startEditTitle()">編集</div>
    </div>

    <div class="sec-label">PROGRESS</div>
    <div class="card">
      <div class="prog-row"><div class="prog-num">${perc}%</div><div class="prog-count">${done} / ${total} 完了</div></div>
      <div class="track"><div class="fill" style="width:${perc}%"></div></div>
    </div>

    <div class="sec-label">SCHEDULE</div>
    <div class="card">
      <div class="sch-grid">
        <div class="sf"><label>納期</label><input type="date" id="dl" value="${v.deadline||''}" onchange="saveDl(this.value)"></div>

function autoResizeTextarea(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
function startEditOverview(){

function cancelEditOverview(){

  document.getElementById('ov-cancel').style.display='none';

}
function saveOverview(){
  const c=getCurrentClient();if(!c)return;

  document.getElementById('ov-save').style.display='none';
  document.getElementById('ov-cancel').style.display='none';

function pickOverviewFile(){
  const fp=document.getElementById('file-picker');
  fp.onchange=function(){
    const file=fp.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
      const content=e.target.result;
      const c=getCurrentClient();if(!c)return;
      c.overview=content;c.claudePath=file.name;save();renderClientDetail();
    };
    reader.readAsText(file,'UTF-8');
    fp.value='';
  };
  fp.click();
}
function downloadOverview(){
  const c=getCurrentClient();if(!c)return;
  const content=c.overview||'';
  const blob=new Blob([content],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=c.claudePath||(c.name+'.md');
  a.click();URL.revokeObjectURL(a.href);
}

  <div class="palette-group" style="border-bottom:1px solid var(--border);padding-bottom:8px">
    <div class="palette-group-header">
      <div class="palette-group-label">${esc(g.group)}</div>
      <button class="group-del-btn" onclick="deleteGroup(${gi})">グループ削除</button>
    </div>
    ${colorsHTML}

      <div class="add-color-trigger" id="${addTriggerId}" onclick="toggleAddColor(${gi})">＋ 色を追加</div>

        </div>
      </div>
    </div>

function copyColor(hex,btnId){
  const code=hex.replace('#','');
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='✓ コピー済';btn.classList.add('copied');}
    showToast(code+' をコピーしました');
    setTimeout(()=>{if(btn){btn.textContent='コピー';btn.classList.remove('copied');}},2000);
  });
}
function toggleColorEdit(id){const el=document.getElementById(id);const hidden=getComputedStyle(el).display==='none';el.style.display=hidden?'block':'none';}
function saveColorEdit(gi,ci){
  const c=getCurrentClient();if(!c)return;
  const name=document.getElementById(`ce-${gi}-${ci}-name`).value.trim();
  const role=document.getElementById(`ce-${gi}-${ci}-role`).value.trim();
  const hex=document.getElementById(`ce-${gi}-${ci}-hex`).value.trim();
  if(name)c.palette[gi].colors[ci].name=name;
  if(role)c.palette[gi].colors[ci].role=role;
  if(/^#[0-9A-Fa-f]{3,6}$/.test(hex))c.palette[gi].colors[ci].hex=hex.toUpperCase();
  save();renderClientDetail();showToast('色を更新しました');
}
function deleteColor(gi,ci){const c=getCurrentClient();if(!c)return;c.palette[gi].colors.splice(ci,1);save();renderClientDetail();}
function toggleAddColor(gi){
  const el=document.getElementById('addcform-'+gi);const tr=document.getElementById('addctr-'+gi);
  const open=el.style.display==='none';el.style.display=open?'flex':'none';tr.style.display=open?'none':'';
}
function submitAddColor(gi){
  const c=getCurrentClient();if(!c)return;
  const name=document.getElementById(`ac-${gi}-name`).value.trim();
  const role=document.getElementById(`ac-${gi}-role`).value.trim();
  const hex=document.getElementById(`ac-${gi}-hex`).value.trim();
  if(!name||!hex)return;
  const h=/^#[0-9A-Fa-f]{3,6}$/.test(hex)?hex.toUpperCase():'#'+hex.toUpperCase();
  c.palette[gi].colors.push({name,role,hex:h});
  save();renderClientDetail();showToast('色を追加しました');
}
function addGroup(){
  const c=getCurrentClient();if(!c)return;
  const inp=document.getElementById('addg-input');
  const name=inp.value.trim();if(!name)return;
  if(!c.palette)c.palette=[];

function deleteGroup(gi){
  const c=getCurrentClient();if(!c)return;
  if(!confirm('このグループを削除しますか？'))return;
  c.palette.splice(gi,1);save();renderClientDetail();
}

function refListHTML(c){

      <button class="ref-action-btn" onclick="delRef(${i})">×</button>

function addRef(){
  const c=getCurrentClient();if(!c)return;
  const labelInp=document.getElementById('ref-label-input');
  const urlInp=document.getElementById('ref-url-input');

/* ---- ADD STEP (動画単位) ---- */
function addRowHTML(sec){
  return `<div class="add-step-row" id="addrow-${sec}">
    <div class="add-step-trigger" onclick="showAddInput('${sec}')">＋ 工程を追加</div>
    <div class="add-step-form" id="addform-${sec}" style="display:none">
      <input class="add-step-input" id="addinput-${sec}" type="text" placeholder="工程名を入力..." onkeydown="if(event.key==='Enter')submitExtra('${sec}')">
      <button class="add-step-btn" onclick="submitExtra('${sec}')">追加</button>
      <button class="add-step-cancel" onclick="hideAddInput('${sec}')">✕</button>
    </div>
  </div>`;
}
function showAddInput(sec){document.getElementById('addform-'+sec).style.display='flex';document.getElementById('addrow-'+sec).querySelector('.add-step-trigger').style.display='none';document.getElementById('addinput-'+sec).focus();}
function hideAddInput(sec){document.getElementById('addform-'+sec).style.display='none';document.getElementById('addrow-'+sec).querySelector('.add-step-trigger').style.display='';document.getElementById('addinput-'+sec).value='';}
function submitExtra(sec){
  const inp=document.getElementById('addinput-'+sec);
  const t=inp.value.trim();if(!t)return;
  const v=getCurrentVideo();if(!v)return;
  ensureExtras(v);ensureOrder(v);
  const key='e'+v.extras[sec].length;
  v.extras[sec].push({t,done:false,detail:''});
  v.order[sec].push(key);
  save();renderVideoDetail();
}
function togExtra(sec,idx){const v=getCurrentVideo();if(!v)return;ensureExtras(v);v.extras[sec][idx].done=!v.extras[sec][idx].done;save();renderVideoDetail();}
function delExtra(sec,idx){
  const v=getCurrentVideo();if(!v)return;
  ensureExtras(v);ensureOrder(v);ensureMemos(v);
  const key='e'+idx;
  v.order[sec]=v.order[sec].filter(k=>k!==key).map(k=>{
    if(typeof k==='string'&&k.startsWith('e')){const n=parseInt(k.slice(1));if(n>idx)return'e'+(n-1);}
    return k;
  });
  const sc=sec[0];
  const nm={};
  Object.entries(v.memos).forEach(([mk,mv])=>{
    if(mk.startsWith('e'+sc)){const n=parseInt(mk.slice(2));if(n===idx)return;nm['e'+sc+(n>idx?n-1:n)]=mv;}
    else nm[mk]=mv;
  });
  v.memos=nm;
  v.extras[sec].splice(idx,1);
  save();renderVideoDetail();
}
function startEditExtra(sec,idx){
  document.getElementById('etw-'+sec+'-'+idx).style.display='none';
  document.getElementById('eew-'+sec+'-'+idx).style.display='flex';
  const inp=document.getElementById('eei-'+sec+'-'+idx);inp.focus();inp.select();
}
function saveExtra(sec,idx){
  const inp=document.getElementById('eei-'+sec+'-'+idx);
  const t=inp.value.trim();const v=getCurrentVideo();if(!v||!t)return;
  ensureExtras(v);v.extras[sec][idx].t=t;save();renderVideoDetail();
}
function moveInOrder(sec,key,dir){
  const v=getCurrentVideo();if(!v)return;
  ensureOrder(v);
  const arr=v.order[sec],i=arr.indexOf(key);if(i<0)return;
  const ni=i+dir;if(ni<0||ni>=arr.length)return;
  [arr[i],arr[ni]]=[arr[ni],arr[i]];
  save();renderVideoDetail();
}

function toggleSeq(){
  seqOpen=!seqOpen;
  const sp=document.getElementById('seq-panel');if(sp)sp.classList.toggle('open',seqOpen);
  const btn=document.querySelector('.item-detail-btn');
  if(btn)btn.textContent=seqOpen?'シーケンス構成を確認 ▴':'シーケンス構成を確認 ▾';
}
function togItem(idx){const v=getCurrentVideo();if(!v)return;v.checks[idx]=!v.checks[idx];save();renderVideoDetail();}
function saveScheduleField(key,v){const vid=getCurrentVideo();if(!vid)return;vid[key]=v;save();}
function saveDl(v){const vid=getCurrentVideo();if(!vid)return;vid.deadline=v;calcDates(v,true);save();}
function calcDates(v,force){
  if(!v)return;
  const vid=getCurrentVideo();if(!vid)return;
  const fmt=d=>{const m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return m+'/'+dd};
  const base=new Date(v);
  const sub=n=>{const x=new Date(base);x.setDate(x.getDate()-n);return x};
  const today=new Date();today.setHours(0,0,0,0);
  const deadline=new Date(v);deadline.setHours(0,0,0,0);
  const days=Math.round((deadline-today)/(1000*60*60*24));
  // カット1日／テロップ1日／演出2日（日にちがない場合は1日）／書き出し・チェック2日
  const tight=days<6;
  const s1v=tight?fmt(sub(4)):fmt(sub(5)); // 粗カット完了
  const s2v=tight?fmt(sub(3)):fmt(sub(4)); // テロップ完了
  const s3v=fmt(sub(1)); // 書き出し・チェック（納期前日）
  if(force||vid.s1===undefined)vid.s1=s1v;
  if(force||vid.s2===undefined)vid.s2=s2v;
  if(force||vid.s3===undefined)vid.s3=s3v;
  const s1=document.getElementById('s1'),s2=document.getElementById('s2'),s3=document.getElementById('s3');
  if(s1)s1.value=vid.s1||'';
  if(s2)s2.value=vid.s2||'';
  if(s3)s3.value=vid.s3||'';
}
function toggleSec(id,aid){
  const el=document.getElementById('sec-'+id);const ar=document.getElementById(aid);
  const h=el.style.display==='none';el.style.display=h?'':'none';ar.textContent=h?'▲':'▼';
}
